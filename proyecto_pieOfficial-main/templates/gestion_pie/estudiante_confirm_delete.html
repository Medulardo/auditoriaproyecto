{% extends 'base.html' %}

{% block content %}
    <h1>Confirmar Eliminación</h1>
    
    <p>¿Estás seguro de que quieres eliminar al estudiante <strong>{{ object.nombres }} {{ object.apellidos }}</strong>?</p>
    <p>Esta acción no se puede deshacer.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background-color: red; color: white;">Sí, Eliminar</button>
        <a href="{% url 'estudiante-detail' object.pk %}">Cancelar</a>
    </form>
{% endblock %}
