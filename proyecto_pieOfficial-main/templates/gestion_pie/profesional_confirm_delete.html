{% extends 'base.html' %}

{% block content %}
    <h1>Confirmar Eliminación</h1>
    
    <p>¿Estás seguro de que quieres eliminar al profesional <strong>{{ object.nombre_completo }}</strong>?</p>
    <p><strong>¡Atención!</strong> Esto también eliminará su cuenta de usuario (login) <strong>{{ object.user.username }}</strong> asociada.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background-color: red; color: white;">Sí, Eliminar</button>
        <a href="{% url 'profesional-detail' object.pk %}">Cancelar</a>
    </form>
{% endblock %}
