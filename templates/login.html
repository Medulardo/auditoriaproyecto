<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <style>
        html, body {
            height: 100%;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5; /* Un fondo gris claro */
        }
        .form-signin {
            width: 100%;
            max-width: 400px; /* Ancho del formulario */
        }
    </style>
</head>
<body class="text-center">

    <main class="form-signin">
        <div class="card shadow">
            <div class="card-body p-4 p-md-5">

                <form method="post">
                    <h2 class="h3 mb-3 fw-normal">Iniciar Sesión</h2>
                    {% csrf_token %}
                    
                    {% if form.errors %}
                        <div class="alert alert-danger" role="alert">
                            Tu usuario o contraseña son incorrectos.
                        </div>
                    {% endif %}

                    <div class="form-floating mb-3">
                        <input type="text" name="username" class="form-control" id="id_username" placeholder="usuario" required autofocus>
                        <label for="id_username">Usuario</label>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="password" name="password" class="form-control" id="id_password" placeholder="Contraseña" required>
                        <label for="id_password">Contraseña</label>
                    </div>
                    
                    <button class="w-100 btn btn-lg btn-primary" type="submit">Entrar</button>
                </form>

            </div>
        </div>
    </main>
    
</body>
</html>
