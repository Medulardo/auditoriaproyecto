{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width:720px">
  <h1 class="h5 mb-3">Eliminar actividad</h1>
  <div class="card shadow-sm">
    <div class="card-body">
      <p>¿Seguro que deseas eliminar la actividad del <strong>{{ actividad.fecha|date:"d/m/Y" }}</strong> ({{ actividad.get_tipo_display }})?</p>
      <form method="post">
        {% csrf_token %}
        <a href="{% url 'informe-pie-detail' informe.pk %}" class="btn btn-outline-secondary">Cancelar</a>
        <button type="submit" class="btn btn-danger">Eliminar</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
